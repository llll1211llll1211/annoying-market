<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>귀찮음 거래소 - 목록</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="topbar">
        <h1>귀찮음 거래소</h1>
        <div class="profile-area">
            <span id="my-nickname"></span>
            <div class="profile-circle"></div>
        </div>
    </div>

    <div class="page-container">
        <div class="filter-bar">
            <input type="text" id="search-input" placeholder="검색...">

            <select id="region-select">
                <option value="전체">지역 전체</option>
                <option value="본관동">본관동</option>
                <option value="별관동">별관동</option>
                <option value="1공학관">1공학관</option>
                <option value="2공학관">2공학관</option>
                <option value="3공학관">3공학관</option>
                <option value="담헌실학관">담헌실학관</option>
                <option value="인문경영관">인문경영관</option>
                <option value="다산정보관">다산정보관</option>
                <option value="미래학습관">미래학습관</option>
                <option value="복지관">복지관</option>
                <option value="학생회관">학생회관</option>
                <option value="정문">정문</option>
                <option value="후문">후문</option>
            </select>

            <select id="category-select">
                <option value="전체">카테고리 전체</option>
                <option value="조립/설치">조립/설치</option>
                <option value="청소/정리">청소/정리</option>
                <option value="배달/장보기">배달/장보기</option>
                <option value="돌봄/동행">돌봄/동행</option>
                <option value="심부름/대행">심부름/대행</option>
            </select>

            <button id="write-btn">+ 글쓰기</button>
        </div>

        <div id="post-list">
            <!-- 여기에 카드들이 JS로 자동 생성됨 -->
        </div>
    </div>

    <script src="common.js"></script>
    <script src="list.js"></script>
</body>

</html>
