<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>귀찮음 거래소</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="center-page">

    <div id="nickname-screen" class="screen">
        <div class="card">
            <h2>사용할 닉네임을 입력해주세요</h2>
            <input type="text" id="nickname-input" placeholder="닉네임을 입력해주세요">
            <button id="start-btn">시작하기</button>
            <p class="hint">
                비밀번호 없이 이 이름으로 활동해요<br>
                한 번 입력하면 이 브라우저에서는 다시 묻지 않아요
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
